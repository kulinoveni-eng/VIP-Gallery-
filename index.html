<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pao Arias Live Chat</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag Rewarded Interstitial -->
  <script src="//libtl.com/sdk.js" data-zone="10982953" data-sdk="show_10982953"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:#fff;
      background:radial-gradient(circle at top,#42005c,#160020 45%,#050007);
      min-height:100vh;
      overflow-x:hidden;
    }
    .app{max-width:430px;margin:auto;padding:18px 18px 28px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .logo{font-size:26px;font-weight:900}
    .online{
      background:#12c978;
      padding:10px 17px;
      border-radius:22px;
      font-size:15px;
      box-shadow:0 0 28px #12c978;
    }
    .hero{
      position:relative;
      border-radius:30px;
      overflow:hidden;
      background:#111;
      box-shadow:0 0 35px rgba(255,45,117,.45),0 25px 70px #000;
      border:1px solid rgba(255,255,255,.12);
    }
    .hero img{
      width:100%;
      height:500px;
      object-fit:cover;
      object-position:center top;
      display:block;
    }
    .shade{
      position:absolute;
      inset:0;
      background:linear-gradient(to top,#000 8%,rgba(0,0,0,.25) 45%,transparent 72%);
    }
    .info{position:absolute;left:20px;right:20px;bottom:22px}
    .name{font-size:34px;font-weight:900;text-shadow:0 2px 10px #000}
    .status{font-size:16px;color:#eee;margin-top:6px}
    .typing{
      margin-top:14px;
      background:rgba(255,255,255,.16);
      padding:13px 16px;
      border-radius:22px;
      font-size:15px;
      backdrop-filter:blur(10px);
    }
    .liveMsg{
      margin:16px 0;
      padding:13px 16px;
      background:rgba(255,255,255,.12);
      border-radius:22px;
      font-size:15px;
      border:1px solid rgba(255,255,255,.1);
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin:18px 0;
    }
    .card{
      height:135px;
      border-radius:22px;
      overflow:hidden;
      position:relative;
      background:#222;
    }
    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
      filter:blur(6px) brightness(.75);
      transform:scale(1.08);
    }
    .lock{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      background:rgba(0,0,0,.28);
    }
    .btn{
      width:100%;
      border:0;
      border-radius:24px;
      padding:18px;
      font-size:18px;
      font-weight:900;
      margin-top:12px;
      color:#fff;
      cursor:pointer;
    }
    .chatBtn{
      background:linear-gradient(90deg,#ff2070,#ff8a00);
      box-shadow:0 12px 35px rgba(255,45,117,.45);
    }
    .vipBtn{
      background:linear-gradient(90deg,#7b2cff,#00d4ff);
      box-shadow:0 12px 35px rgba(0,212,255,.35);
    }
    .note{text-align:center;color:#ddd;font-size:13px;margin-top:14px}
    .hidden{display:none}
    .chatbox{
      margin-top:18px;
      background:rgba(255,255,255,.1);
      border-radius:24px;
      padding:14px;
      border:1px solid rgba(255,255,255,.1);
    }
    .msg{
      background:rgba(255,255,255,.16);
      padding:11px 14px;
      border-radius:18px;
      margin:9px 0;
      font-size:14px;
    }
    .me{background:#2481cc;margin-left:55px}
    .replyGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      margin-top:12px;
    }
    .replyBtn{
      border:0;
      border-radius:18px;
      padding:13px;
      background:rgba(255,255,255,.18);
      color:white;
      font-weight:800;
      font-size:14px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div class="logo">🔥 Live Chat</div>
      <div class="online"><span id="onlineCount">139</span> online</div>
    </div>

    <div class="hero">
      <img src="girl1.jpg" alt="Pao Arias profile">
      <div class="shade"></div>
      <div class="info">
        <div class="name">Pao Arias, 22</div>
        <div class="status">📍 Near you • Active now</div>
        <div class="typing" id="typingText">💬 Pao Arias is typing...</div>
      </div>
    </div>

    <div class="liveMsg" id="liveMsg">💌 Pao: Hi babe 😘 are you there?</div>

    <div class="cards">
      <div class="card"><img src="girl1.jpg"><div class="lock">🔒</div></div>
      <div class="card"><img src="girl1.jpg"><div class="lock">🔒</div></div>
      <div class="card"><img src="girl1.jpg"><div class="lock">🔒</div></div>
    </div>

    <button class="btn chatBtn" onclick="startChat()">Start Chat Free 💬</button>
    <button class="btn vipBtn" onclick="unlockVIP()">Unlock VIP Gallery 🔓</button>

    <div class="note">Reply once → watch short ad → continue chat</div>

    <div id="chatbox" class="chatbox hidden">
      <div id="messages">
        <div class="msg">Hey 😘 are you there?</div>
      </div>

      <div class="replyGrid">
        <button class="replyBtn" onclick="replyWithAd('Hi 😘')">Hi 😘</button>
        <button class="replyBtn" onclick="replyWithAd('Where are you from?')">Where are you from?</button>
        <button class="replyBtn" onclick="replyWithAd('Send me a pic 🔥')">Send me a pic 🔥</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#160020");
      tg.setBackgroundColor("#160020");
    }

    const liveMessages = [
      "💌 Pao: Hi babe 😘 are you there?",
      "💌 Pao: I’m online now...",
      "💌 Pao: Want to chat with me?",
      "💌 Pao: Reply me first 😍",
      "💌 Pao: I have private photos 🔥"
    ];

    const botReplies = [
      "Hey babe 😘 I was waiting for you.",
      "I’m very close to you right now 📍",
      "You seem cute 😍",
      "Want to unlock my private gallery? 🔥",
      "Watch one short ad and I’ll show you more 😘"
    ];

    let replyIndex = 0;

    setInterval(() => {
      const num = Math.floor(Math.random() * 130) + 120;
      document.getElementById("onlineCount").innerText = num;

      const randomMsg = liveMessages[Math.floor(Math.random() * liveMessages.length)];
      document.getElementById("liveMsg").innerText = randomMsg;
    }, 2500);

    function startChat() {
      document.getElementById("chatbox").classList.remove("hidden");
      setTimeout(() => {
        addBotMsg("Pao Arias is typing...");
        setTimeout(() => {
          addBotMsg("Reply me 😘");
        }, 1200);
      }, 500);
    }

    function replyWithAd(text) {
      addUserMsg(text);

      if (typeof show_10982953 === "function") {
        show_10982953().then(() => {
          afterAdReply();
        }).catch(() => {
          alert("Ad not ready. Please try again.");
        });
      } else {
        alert("Ad loading... Please wait 3 seconds and try again.");
      }
    }

    function afterAdReply() {
      const reply = botReplies[replyIndex % botReplies.length];
      replyIndex++;

      setTimeout(() => {
        addBotMsg("Typing...");
        setTimeout(() => {
          addBotMsg(reply);

          if (replyIndex >= 3) {
            unlockPhotos();
          }
        }, 1000);
      }, 400);
    }

    function unlockVIP() {
      if (typeof show_10982953 === "function") {
        show_10982953().then(() => {
          unlockPhotos();
        }).catch(() => {
          alert("Ad not ready. Please try again.");
        });
      } else {
        alert("Ad loading... Please wait 3 seconds and try again.");
      }
    }

    function unlockPhotos() {
      document.querySelectorAll(".card img").forEach(img => {
        img.style.filter = "none";
        img.style.transform = "scale(1)";
      });

      document.querySelectorAll(".lock").forEach(lock => {
        lock.style.display = "none";
      });

      alert("VIP Gallery unlocked 🔥");
    }

    function addUserMsg(text) {
      const box = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "msg me";
      div.innerText = text;
      box.appendChild(div);
    }

    function addBotMsg(text) {
      const box = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "msg";
      div.innerText = text;
      box.appendChild(div);
    }
  </script>
</body>
</html>
