<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP Live Chat</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag Rewarded Interstitial -->
  <script src="//libtl.com/sdk.js" data-zone="10982953" data-sdk="show_10982953"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:#fff;
      background:radial-gradient(circle at top,#42005c,#160020 45%,#050007);
      min-height:100vh;
      overflow-x:hidden;
    }
    .app{max-width:430px;margin:auto;padding:18px 18px 28px}
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
    }
    .logo{font-size:28px;font-weight:900}
    .online{
      background:#12c978;
      padding:10px 17px;
      border-radius:22px;
      font-size:15px;
      box-shadow:0 0 28px #12c978;
    }
    .hero{
      position:relative;
      border-radius:30px;
      overflow:hidden;
      background:#111;
      box-shadow:0 0 35px rgba(255,45,117,.45),0 25px 70px #000;
      border:1px solid rgba(255,255,255,.12);
    }
    .hero img{
      width:100%;
      height:520px;
      object-fit:cover;
      object-position:center top;
      display:block;
      filter:none;
    }
    .shade{
      position:absolute;
      inset:0;
      background:linear-gradient(to top,#000 8%,rgba(0,0,0,.25) 42%,transparent 70%);
    }
    .info{
      position:absolute;
      left:20px;
      right:20px;
      bottom:22px;
    }
    .name{
      font-size:34px;
      font-weight:900;
      text-shadow:0 2px 10px #000;
    }
    .status{
      font-size:16px;
      color:#eee;
      margin-top:6px;
    }
    .typing{
      margin-top:14px;
      background:rgba(255,255,255,.16);
      padding:13px 16px;
      border-radius:22px;
      font-size:15px;
      backdrop-filter:blur(10px);
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin:18px 0;
    }
    .card{
      height:135px;
      border-radius:22px;
      overflow:hidden;
      position:relative;
      background:#222;
      box-shadow:0 0 18px rgba(255,255,255,.08);
    }
    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
      filter:blur(6px) brightness(.75);
      transform:scale(1.08);
    }
    .lock{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      background:rgba(0,0,0,.28);
    }
    .btn{
      width:100%;
      border:0;
      border-radius:24px;
      padding:18px;
      font-size:18px;
      font-weight:900;
      margin-top:12px;
      color:#fff;
      cursor:pointer;
    }
    .chatBtn{
      background:linear-gradient(90deg,#ff2070,#ff8a00);
      box-shadow:0 12px 35px rgba(255,45,117,.45);
    }
    .vipBtn{
      background:linear-gradient(90deg,#7b2cff,#00d4ff);
      box-shadow:0 12px 35px rgba(0,212,255,.35);
    }
    .note{
      text-align:center;
      color:#ddd;
      font-size:13px;
      margin-top:14px;
    }
    .hidden{display:none}
    .chatbox{
      margin-top:18px;
      background:rgba(255,255,255,.1);
      border-radius:24px;
      padding:14px;
      border:1px solid rgba(255,255,255,.1);
    }
    .msg{
      background:rgba(255,255,255,.16);
      padding:11px 14px;
      border-radius:18px;
      margin:9px 0;
      font-size:14px;
    }
    .me{
      background:#2481cc;
      margin-left:55px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div class="logo">🔥 Live Chat</div>
      <div class="online"><span id="onlineCount">139</span> online</div>
    </div>

    <div class="hero">
      <img src="girl1.jpg" alt="CamenJulia profile">
      <div class="shade"></div>
      <div class="info">
        <div class="name">CamenJulia, 22</div>
        <div class="status">📍 Near you • Active now</div>
        <div class="typing">💬 CamenJulia is typing...</div>
      </div>
    </div>

    <div class="cards">
      <div class="card"><img src="girl1.jpg" alt=""><div class="lock">🔒</div></div>
      <div class="card"><img src="girl1.jpg" alt=""><div class="lock">🔒</div></div>
      <div class="card"><img src="girl1.jpg" alt=""><div class="lock">🔒</div></div>
    </div>

    <button class="btn chatBtn" onclick="startChat()">Start Chat Free 💬</button>
    <button class="btn vipBtn" onclick="unlockVIP()">Unlock VIP Gallery 🔓</button>

    <div class="note">Watch short ad to unlock private photos</div>

    <div id="chatbox" class="chatbox hidden">
      <div class="msg">Hey 😘 are you there?</div>
      <div class="msg me">Yes, I’m here</div>
      <div class="msg">Unlock my VIP photos first 🔥</div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#160020");
      tg.setBackgroundColor("#160020");
    }

    setInterval(() => {
      const num = Math.floor(Math.random() * 90) + 90;
      document.getElementById("onlineCount").innerText = num;
    }, 2500);

    function startChat() {
      document.getElementById("chatbox").classList.remove("hidden");
    }

    function unlockVIP() {
      if (typeof show_10982953 === "function") {
        show_10982953().then(() => {
          unlockPhotos();
        }).catch(() => {
          alert("Ad not ready. Please try again.");
        });
      } else {
        alert("Ad loading... Please wait 3 seconds and try again.");
      }
    }

    function unlockPhotos() {
      document.querySelectorAll(".card img").forEach(img => {
        img.style.filter = "none";
        img.style.transform = "scale(1)";
      });

      document.querySelectorAll(".lock").forEach(lock => {
        lock.style.display = "none";
      });

      alert("VIP Gallery unlocked 🔥");
    }
  </script>
</body>
</html>
