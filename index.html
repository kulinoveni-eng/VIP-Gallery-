<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pao Arias Chat</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag -->
  <script src="//libtl.com/sdk.js" data-zone="10982953" data-sdk="show_10982953"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#111827,#020617);
      color:white;
    }
    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      background:#0f172a;
      position:relative;
      overflow:hidden;
    }
    .header{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px;
      background:rgba(15,23,42,.95);
      border-bottom:1px solid rgba(255,255,255,.08);
      position:sticky;
      top:0;
      z-index:10;
    }
    .avatar{
      width:52px;
      height:52px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid #22c55e;
    }
    .name{font-size:18px;font-weight:700}
    .status{font-size:13px;color:#22c55e}
    .badge{
      margin-left:auto;
      background:#ef4444;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
    }
    .profile{
      text-align:center;
      padding:18px 14px 10px;
    }
    .hero{
      width:92%;
      max-height:330px;
      object-fit:cover;
      border-radius:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }
    .timer{
      margin-top:12px;
      display:inline-block;
      background:rgba(239,68,68,.15);
      border:1px solid rgba(239,68,68,.4);
      color:#fecaca;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
    }
    .chat{
      padding:14px;
      padding-bottom:120px;
    }
    .msg{
      max-width:78%;
      padding:11px 14px;
      margin:10px 0;
      border-radius:18px;
      font-size:15px;
      line-height:1.35;
      animation:pop .25s ease;
    }
    .her{
      background:#1e293b;
      border-bottom-left-radius:4px;
    }
    .me{
      margin-left:auto;
      background:#2563eb;
      border-bottom-right-radius:4px;
    }
    .locked{
      background:rgba(255,255,255,.07);
      border:1px dashed rgba(255,255,255,.25);
      color:#cbd5e1;
      text-align:center;
      max-width:100%;
    }
    .typing{
      color:#94a3b8;
      font-size:13px;
      margin:8px 4px;
    }
    .bottom{
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:430px;
      padding:12px;
      background:linear-gradient(180deg,rgba(15,23,42,0),#0f172a 30%);
    }
    .reply{
      width:100%;
      border:0;
      border-radius:18px;
      padding:15px;
      font-size:16px;
      font-weight:800;
      color:white;
      background:linear-gradient(135deg,#ec4899,#8b5cf6);
      box-shadow:0 12px 30px rgba(236,72,153,.35);
    }
    .reply:active{transform:scale(.98)}
    .small{
      text-align:center;
      color:#94a3b8;
      font-size:12px;
      margin-top:8px;
    }
    @keyframes pop{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <img src="girl1.jpg" class="avatar">
      <div>
        <div class="name">Pao Arias</div>
        <div class="status">● Online now</div>
      </div>
      <div class="badge">VIP</div>
    </div>

    <div class="profile">
      <img id="heroImg" src="girl1.jpg" class="hero">
      <div class="timer">Private chat closes in <span id="count">05:00</span></div>
    </div>

    <div class="chat" id="chat">
      <div class="msg her">Hey… you finally came 😘</div>
      <div class="msg her">I was waiting for your reply…</div>
      <div class="msg locked">🔒 Reply to unlock her next message</div>
    </div>

    <div class="bottom">
      <button class="reply" onclick="replyNow()">Reply & Unlock Message 🔥</button>
      <div class="small">Ad may appear before unlocking</div>
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.expand();
    tg.ready();
  }

  const images = ["girl1.jpg","girl2.jpg","girl3.jpg"];
  const replies = [
    "Mmm… I like fast replies 😏",
    "Are you still here with me?",
    "I have something private to show you…",
    "Don’t disappear now 😘",
    "Say something cute first…",
    "Okay… I’ll send one more message 🔥",
    "You’re making me smile right now",
    "Want to continue this private chat?"
  ];

  let step = 0;
  let seconds = 300;

  function updateTimer(){
    seconds--;
    if(seconds < 0) seconds = 300;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById("count").innerText = `${m}:${s}`;
  }
  setInterval(updateTimer,1000);

  function addMsg(text, cls){
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
  }

  function typingThenMessage(){
    const chat = document.getElementById("chat");
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.innerText = "Pao Arias is typing...";
    chat.appendChild(typing);

    setTimeout(()=>{
      typing.remove();
      addMsg(replies[step % replies.length], "her");
      step++;

      document.getElementById("heroImg").src = images[step % images.length];

      if(step % 2 === 0){
        addMsg("🔒 Reply again to unlock the next private message", "locked");
      }
    },1200);
  }

  function replyNow(){
    addMsg("Reply sent ❤️", "me");

    if(typeof show_10982953 === "function"){
      show_10982953('pop')
        .then(() => {
          typingThenMessage();
        })
        .catch(() => {
          typingThenMessage();
        });
    } else {
      typingThenMessage();
    }
  }
</script>
</body>
</html>
