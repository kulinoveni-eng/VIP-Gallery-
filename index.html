<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pao Arias VIP Chat</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="//libtl.com/sdk.js" data-zone="10982953" data-sdk="show_10982953"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#020617;
  color:#fff;
}
.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  background:linear-gradient(180deg,#111827,#020617);
}
.top{
  position:sticky;
  top:0;
  z-index:99;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background:rgba(15,23,42,.96);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.back{font-size:24px;color:#cbd5e1}
.avatar{
  width:48px;height:48px;border-radius:50%;
  object-fit:cover;border:2px solid #22c55e;
}
.info{flex:1}
.name{font-weight:800;font-size:17px}
.status{font-size:12px;color:#22c55e}
.call{font-size:20px}
.viewer{
  background:rgba(34,197,94,.14);
  color:#86efac;
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}
.heroBox{
  padding:14px;
  text-align:center;
}
.hero{
  width:100%;
  max-height:300px;
  object-fit:cover;
  border-radius:24px;
  box-shadow:0 18px 45px rgba(0,0,0,.45);
}
.timer{
  margin-top:10px;
  font-size:13px;
  color:#fecaca;
}
.chat{
  padding:10px 12px 125px;
}
.msg{
  max-width:78%;
  padding:10px 13px;
  margin:8px 0;
  border-radius:18px;
  font-size:15px;
  line-height:1.35;
  animation:pop .25s ease;
  position:relative;
}
.her{
  background:#1e293b;
  border-bottom-left-radius:5px;
}
.me{
  margin-left:auto;
  background:#2563eb;
  border-bottom-right-radius:5px;
}
.meta{
  font-size:10px;
  color:#cbd5e1;
  margin-top:4px;
  text-align:right;
}
.locked{
  max-width:100%;
  text-align:center;
  background:rgba(236,72,153,.12);
  border:1px dashed rgba(236,72,153,.45);
  color:#fbcfe8;
}
.typing{
  display:inline-flex;
  gap:4px;
  background:#1e293b;
  padding:10px 13px;
  border-radius:18px;
  margin:8px 0;
}
.typing span{
  width:7px;height:7px;background:#94a3b8;border-radius:50%;
  animation:bounce 1s infinite;
}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
.bottom{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  width:100%;
  max-width:430px;
  padding:12px;
  background:linear-gradient(180deg,rgba(2,6,23,0),#020617 28%);
}
.input{
  display:flex;
  gap:8px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:8px;
}
.fakeInput{
  flex:1;
  padding:12px;
  color:white;
  background:transparent;
  border:0;
  outline:none;
  font-size:15px;
}
.fakeInput::placeholder{
  color:#94a3b8;
}
.btn{
  border:0;
  border-radius:18px;
  padding:0 16px;
  color:white;
  font-weight:900;
  background:linear-gradient(135deg,#ec4899,#8b5cf6);
}
.note{
  text-align:center;
  color:#94a3b8;
  font-size:11px;
  margin-top:7px;
}
@keyframes pop{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes bounce{
  0%,80%,100%{transform:translateY(0);opacity:.4}
  40%{transform:translateY(-5px);opacity:1}
}
</style>
</head>

<body>
<div class="app">

  <div class="top">
    <div class="back">‹</div>
    <img src="girl1.jpg" class="avatar" id="avatar">
    <div class="info">
      <div class="name">Pao Arias 💕</div>
      <div class="status" id="status">● Online now</div>
    </div>
    <div class="viewer" id="viewer">23 online</div>
    <div class="call">♡</div>
  </div>

  <div class="heroBox">
    <img src="girl1.jpg" class="hero" id="hero">
    <div class="timer">Private chat closes in <span id="count">05:00</span></div>
  </div>

  <div class="chat" id="chat">
    <div class="msg her">Hey… you came back 😘<div class="meta">now</div></div>
    <div class="msg her">I was waiting for your reply…<div class="meta">now</div></div>
    <div class="msg locked">🔒 Reply to unlock her next private message</div>
  </div>

  <div class="bottom">
    <div class="input">
    <input id="userInput" class="fakeInput" placeholder="Type a reply..." />
<button class="btn" onclick="replyNow()">Send 🔥</button>
    </div>
    <div class="note">Ad may appear before the message unlocks</div>
  </div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.expand(); tg.ready(); }

const images = ["girl1.jpg","girl2.jpg","girl3.jpg"];
const messages = [
  "Mmm… I like fast replies 😏",
  "Are you still here with me?",
  "I almost thought you left me…",
  "Okay, I’ll tell you something private soon 🔥",
  "Don’t disappear now 😘",
  "You’re making me smile right now",
  "Reply again… I want to see if you’re serious",
  "This chat is only open for a short time"
];

let step = 0;
let seconds = 300;

function beep(){
  try{
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.volume = 0.25;
    audio.play();
  }catch(e){}
}

function addMsg(text, cls){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = text + '<div class="meta">' + (cls==="me" ? "sent ✓✓" : "now") + '</div>';
  chat.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function showTypingThenReply(){
  const chat = document.getElementById("chat");
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(typing);
  window.scrollTo(0, document.body.scrollHeight);

  setTimeout(()=>{
    typing.remove();
    addMsg(messages[step % messages.length], "her");
    beep();

    step++;
    document.getElementById("hero").src = images[step % images.length];
    document.getElementById("avatar").src = images[step % images.length];

    if(step % 2 === 0){
      const lock = document.createElement("div");
      lock.className = "msg locked";
      lock.innerText = "🔒 Reply again to unlock the next message";
      chat.appendChild(lock);
    }
  }, 1300);
}

function replyNow(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();

  if(!text){
    input.focus();
    return;
  }

  addMsg(text, "me");
  input.value = "";

  if(typeof show_10982953 === "function"){
    show_10982953('pop')
      .then(()=>showTypingThenReply())
      .catch(()=>showTypingThenReply());
  }else{
    showTypingThenReply();
  }
}

setInterval(()=>{
  seconds--;
  if(seconds < 0) seconds = 300;
  let m = String(Math.floor(seconds/60)).padStart(2,"0");
  let s = String(seconds%60).padStart(2,"0");
  document.getElementById("count").innerText = `${m}:${s}`;
},1000);

setInterval(()=>{
  const n = Math.floor(Math.random()*18)+12;
  document.getElementById("viewer").innerText = n + " online";
},2500);

setInterval(()=>{
  const status = document.getElementById("status");
  status.innerText = Math.random() > .25 ? "● Online now" : "typing...";
},3000);

setTimeout(()=>{
  showTypingThenReply();
},3500);
</script>

</body>
</html>
